spring.application.name=SpringBootFileUpload

## jsp 파일 처리하기 위한 prefix와 suffix를 추가
## 컨트롤러에서 home 문자열을 리턴하면
## /WEB-INF/views/home.jsp
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

## 자료업로드 사이즈
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
 
## 외장하드 (데이타베이스: 절대중복되지않는파일명을 만들어서 넣는다)
upload.path=C:/upload

## 메세지 등록
spring.messages.basename=message.message

## 오라클 DBMS 연동설정
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=springboard
spring.datasource.password=springboard

## MyBatis 환경설정
## classpath => src/main/resources
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# 서버설정(기본설정임 안해도됨)
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8